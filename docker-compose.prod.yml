services:
  postgres:
    image: postgres:16-alpine
    container_name: recruitment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-recruitment_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-recruitment_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./recruitment-backend
    image: recruitment-backend:latest
    container_name: recruitment-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-3000}
      DB_HOST: ${DB_HOST:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-recruitment_db}
      DB_DIALECT: ${DB_DIALECT:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_strong_random_secret}
      ENABLE_STARTUP_BACKFILL: ${ENABLE_STARTUP_BACKFILL:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change_this_to_a_strong_password}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-系统管理员}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "${BACKEND_PORT:-3000}"

  frontend:
    build:
      context: ./recruitment-frontend
    image: recruitment-frontend:latest
    container_name: recruitment-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-8080}:80"

volumes:
  postgres_data:
  backend_uploads:
