services:
  postgres:
    image: postgres:16-alpine
    container_name: recruitment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recruitment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recruitment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./recruitment-backend
    container_name: recruitment-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: recruitment_db
      DB_DIALECT: postgres
      JWT_SECRET: change_this_to_a_strong_random_secret
      ENABLE_STARTUP_BACKFILL: "false"
      BOOTSTRAP_ADMIN_USERNAME: admin
      BOOTSTRAP_ADMIN_PASSWORD: change_this_to_a_strong_password
      BOOTSTRAP_ADMIN_NAME: 系统管理员
      BOOTSTRAP_ADMIN_EMAIL: admin@example.com
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "3000"

  frontend:
    build:
      context: ./recruitment-frontend
    container_name: recruitment-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  backend_uploads:
